name: node-app-3 CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "examples/node-app-3/**"
      - ".github/workflows/node-app-3.yml"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: node-app-3

jobs:
  # ── 1. Create ECR repo ────────────────────────────────────────────────────
  ecr-deploy:
    name: CDK Deploy ECR
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: examples/node-app-3/infra

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install CDK dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap
        run: npx cdk bootstrap

      - name: CDK Deploy ECR stack
        run: npx cdk deploy NodeApp3EcrStack --require-approval never

  # ── 2. Build & push image to ECR (ECR now exists) ─────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    environment: prod
    needs: [ecr-deploy]
    defaults:
      run:
        working-directory: examples/node-app-3

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: v1.0.${{ github.run_number }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY:$VERSION \
            -t $REGISTRY/$ECR_REPOSITORY:$SHA_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$VERSION
          docker push $REGISTRY/$ECR_REPOSITORY:$SHA_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$REGISTRY/$ECR_REPOSITORY:$VERSION" >> $GITHUB_OUTPUT

  # ── 3. Force ECS to redeploy with latest image ────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    environment: prod
    needs: [build-and-push]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster node-app-3-cluster \
            --service node-app-3-service \
            --force-new-deployment

